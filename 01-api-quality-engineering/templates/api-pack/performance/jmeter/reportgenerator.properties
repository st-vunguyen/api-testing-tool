# JMeter dashboard generation properties
# Tune per API once evidence-backed thresholds exist.

jmeter.reportgenerator.overall_granularity=60000
jmeter.reportgenerator.graph.responseTimePercentilesOverTime.property.set_granularity=60000
jmeter.reportgenerator.graph.activeThreadsOverTime.property.set_granularity=60000
jmeter.reportgenerator.exporter.html.series_filter=.*
jmeter.reportgenerator.apdex_satisfied_threshold=500
jmeter.reportgenerator.apdex_tolerated_threshold=1500
